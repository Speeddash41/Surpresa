<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Pra Você 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffc0cb, #e6a4f7);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
  margin-top: 25vh;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  cursor: pointer;
}

.sim {
  background-color: #ff4d88;
  color: white;
}

.nao {
  background-color: #555;
  color: white;
  position: fixed;
}

textarea {
  width: 80%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 10px;
}

.heart {
  position: fixed;
  animation: subir 5s linear infinite;
}

@keyframes subir {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div id="app" class="container">
  <h2>Carregando... 💖</h2>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

let step = 0;
let respostas = {};

// 🔥 COLE SEU WEBHOOK OU DEIXA VAZIO
const WEBHOOK_URL = "https://discord.com/api/webhooks/1506824208934637578/7CXLsyEKn2yzLBq5cMZJhEKrlg4mSQ2k_izdxxLkLsmwWbrOXZUkz501r7FDVy8zPvW-";

function render() {
  const app = document.getElementById("app");
  if (!app) return;

  if (step === 0) {
    app.innerHTML = `
      <h2>Oi… eu fiz isso aqui pra você 💖</h2>
      <button onclick="next()">Clica aqui 👀</button>
    `;
  }

  if (step === 1) {
    app.innerHTML = `
      <h2>Você gosta de mim? 😳</h2>
      <button class="sim" onclick="responder('gosta','sim')">Sim 💖</button>
      <button class="sim" onclick="responder('gosta','muito')">Muito 😍</button>
    `;
  }

  if (step === 2) {
    app.innerHTML = `
      <h2>Eu sou especial pra você? 🥺</h2>
      <button class="sim" onclick="responder('especial','sim')">Sim 💖</button>
      <button class="sim" onclick="responder('especial','demais')">Demais 😍</button>
    `;
  }

  if (step === 3) {
    app.innerHTML = `
      <h2>Me dá uma chance de te fazer feliz? 💫</h2>
      <button class="sim" onclick="responder('chance','sim')">Sim 💖</button>
      <button class="sim" onclick="responder('chance','claro')">Claro 😍</button>
    `;
  }

  if (step === 4) {
    app.innerHTML = `
      <h2>Me fala qualidades minhas 👀</h2>
      <textarea id="qualidades"></textarea>
      <h2>Agora defeitos 😅</h2>
      <textarea id="defeitos"></textarea>
      <br>
      <button onclick="salvarTexto()">Continuar 💖</button>
    `;
  }

  if (step === 5) {
    app.innerHTML = `
      <h2>Mesmo com tudo isso… 💭</h2>
      <p>${respostas.qualidades || ""}</p>
      <p>${respostas.defeitos || ""}</p>
      <button onclick="next()">Continuar 💖</button>
    `;
  }

  if (step === 6) {
    app.innerHTML = `
      <h1>Então… 💍</h1>
      <h2>Você aceita namorar comigo? 💖</h2>
      <button class="sim" onclick="aceitou()">SIM 💖</button>
      <button class="nao" id="nao">NÃO 😈</button>
    `;

    const nao = document.getElementById("nao");
    if (nao) {
      nao.onmouseover = () => {
        nao.style.top = Math.random() * window.innerHeight + "px";
        nao.style.left = Math.random() * window.innerWidth + "px";
      };
    }
  }

  if (step === 7) {
    app.innerHTML = `
      <h1>💖 AAAAA 💖</h1>
      <h2>Agora você é oficialmente minha 😍</h2>
    `;
  }
}

window.next = function () {
  step++;
  render();
};

window.responder = function (p, r) {
  respostas[p] = r;
  next();
};

window.salvarTexto = function () {
  respostas.qualidades = document.getElementById("qualidades").value;
  respostas.defeitos = document.getElementById("defeitos").value;
  next();
};

window.aceitou = function () {
  enviarDiscord();
  next();
  coracoes();
};

function enviarDiscord() {
  if (!WEBHOOK_URL) return;

  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content: "💖 NOVA RESPOSTA 💖",
      embeds: [{
        title: "Resultado",
        fields: [
          {name: "Gosta", value: respostas.gosta || "N/A"},
          {name: "Especial", value: respostas.especial || "N/A"},
          {name: "Chance", value: respostas.chance || "N/A"},
          {name: "Qualidades", value: respostas.qualidades || "N/A"},
          {name: "Defeitos", value: respostas.defeitos || "N/A"}
        ]
      }]
    })
  });
}

function coracoes() {
  setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💖";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }, 200);
}

// 🔥 INÍCIO GARANTIDO
render();

});
</script>

</body>
</html>
