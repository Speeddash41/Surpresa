<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pra você 💖</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2") no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  color: white;
  width: 90%;
  max-width: 400px;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.yes { background: #ff4d6d; color: white; }
.no { background: white; color: #ff4d6d; }

textarea {
  width: 90%;
  border-radius: 10px;
  border: none;
  padding: 10px;
  margin-top: 10px;
}

.card {
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
}
</style></head><body><div class="container">
  <h1 id="title">Oi Ananda 💖</h1>
  <p id="text">Confia e responde 👀</p>  <div id="buttons" class="buttons">
    <button class="yes" onclick="next()">Começar</button>
  </div>  <div id="secret" style="display:none;">
    <p>Minhas qualidades?</p>
    <textarea id="q"></textarea><p>Meus defeitos?</p>
<textarea id="d"></textarea>

<button class="yes" onclick="mostrarResumo()">Continuar 💖</button>

  </div>
</div><script>
let step = 0;
let qualidades = "";
let defeitos = "";

function next() {
  step++;

  let title = document.getElementById("title");
  let text = document.getElementById("text");
  let buttons = document.getElementById("buttons");

  if (step === 1) {
    title.innerText = "Pergunta 😏";
    text.innerText = "Você gosta de mim?";
    buttons.innerHTML = `
      <button class="yes" onclick="next()">Sim 💖</button>
      <button class="no" onclick="next()">Muito 😍</button>
    `;
  }

  else if (step === 2) {
    title.innerText = "Área secreta 🔐";
    text.style.display = "none";
    buttons.style.display = "none";
    document.getElementById("secret").style.display = "block";
  }
}

function mostrarResumo() {
  qualidades = document.getElementById("q").value;
  defeitos = document.getElementById("d").value;

  if (!qualidades || !defeitos) {
    alert("Preenche tudo 😅");
    return;
  }

  document.querySelector(".container").innerHTML = `
    <h1>Olha o que você disse 😳</h1>

    <div class="card">
      <h3>💖 Qualidades</h3>
      <p>${qualidades}</p>
    </div>

    <div class="card">
      <h3>😅 Defeitos</h3>
      <p>${defeitos}</p>
    </div>

    <button class="yes" onclick="pedido()">Continuar...</button>
  `;
}

function pedido() {
  document.querySelector(".container").innerHTML = `
    <h1>Depois disso tudo... 💍</h1>
    <p>Mesmo sabendo meus defeitos 😅</p>
    <p>e vendo minhas qualidades 💖</p>

    <h2>Quer namorar comigo?</h2>

    <div class="buttons">
      <button class="yes" onclick="aceitou()">SIM 💖</button>
      <button class="no" onmouseover="fugir(this)">não 😅</button>
    </div>
  `;
}

function aceitou() {
  document.body.innerHTML = `
    <div class="container">
      <h1>EU SABIA 😍💖</h1>
      <p>Agora você é oficialmente minha 💕</p>
    </div>
  `;
}

function fugir(btn) {
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}
</script></body>
</html>
